<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Fabian Abele</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="nav" id="nav">
    <a href="index.html" class="nav-name">Fabian Abele</a>
    <a href="about.html" class="nav-link" id="about-link">About</a>
  </header>

  <div class="artwork-info" id="artwork-info">
    <div class="artwork-title" id="artwork-title"></div>
    <div class="artwork-year" id="artwork-year"></div>
  </div>

  <button class="btn-fullscreen" id="btn-fullscreen" aria-label="Enter fullscreen">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <polyline points="1,6 1,1 6,1"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="17,6 17,1 12,1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="1,12 1,17 6,17"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="17,12 17,17 12,17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <button class="arrow arrow-left" id="arrow-left" aria-label="Previous">
    <svg width="9" height="16" viewBox="0 0 9 16" fill="none">
      <polyline points="8,1 1,8 8,15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <button class="arrow arrow-right" id="arrow-right" aria-label="Next">
    <svg width="9" height="16" viewBox="0 0 9 16" fill="none">
      <polyline points="1,1 8,8 1,15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <main class="artworks" id="artworks"></main>

  <!-- Fullscreen image overlay -->
  <div class="overlay-image" id="overlay-image" role="button" tabindex="0" aria-label="Exit fullscreen">
    <img id="overlay-img" src="" alt="">
  </div>

  <!-- Video player overlay -->
  <div class="overlay-video" id="overlay-video">
    <button class="btn-close" id="btn-close-video" aria-label="Close video">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <video id="overlay-video-player" controls playsinline></video>
  </div>

  <script src="js/artworks.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
